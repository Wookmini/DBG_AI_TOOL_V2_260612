<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DB 글로벌칩 AI 협업방식 자가진단</title>
    <link rel="stylesheet" href="styles.css">
    <!-- 폰트 적용 (Pretendard) -->
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
</head>

<body>
    <!-- 배경 장식 (글래스모피즘용) -->
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>

    <div class="app-container">
        <!-- 인트로 화면 -->
        <section id="intro-view" class="view active full-screen-intro">
            <div class="intro-content">
                <img src="logo.png" alt="DB Global Chip" class="logo-img">
                <h1 class="main-title">당신은 <span class="gradient-text">AI</span>와<br><span
                        class="gradient-text-red">함께</span> 일하고 있나요?</h1>
                <p class="sub-title">나의 AI 활용 수준을 점검하고, 업무 효율을 극대화할 새로운 방법을 찾아보세요.</p>
                <button id="start-btn" class="primary-btn pulse-btn">진단 시작하기</button>
            </div>
            <div class="intro-image">
                <!-- 추상적인 AI 느낌의 그래픽 또는 DB 컬러 패턴 -->
                <div class="hero-graphic"></div>
            </div>
        </section>

        <!-- 인증 화면 -->
        <section id="auth-view" class="view auth-layout">
            <div class="auth-card">
                <img src="logo.png" alt="DB Global Chip" class="logo-small-img">
                <h2>기본 정보 입력</h2>
                <p>사번과 성명을 입력해 주세요.</p>
                <div class="input-group">
                    <label for="emp-id">사번</label>
                    <input type="text" id="emp-id" placeholder="사번을 입력하세요" required>
                </div>
                <div class="input-group">
                    <label for="emp-name">성명</label>
                    <input type="text" id="emp-name" placeholder="이름을 입력하세요" required>
                </div>
                <button id="auth-submit-btn" class="primary-btn">진단 시작하기</button>
                <div id="auth-error" class="auth-error"></div>
            </div>
        </section>

        <!-- 퀴즈 화면 -->
        <section id="quiz-view" class="view quiz-layout">
            <div class="quiz-card">
                <div class="quiz-header">
                    <img src="logo.png" alt="DB Global Chip" class="logo-small-img">
                    <div class="progress-container">
                        <div class="progress-bar" id="progress-bar"></div>
                    </div>
                </div>
                <div class="question-container">
                    <span id="question-number" class="q-number">Q1.</span>
                    <h2 id="question-text">질문 텍스트</h2>
                </div>
                <div id="options-container" class="options-container">
                    <!-- 옵션 버튼들이 여기에 동적으로 생성됩니다. -->
                </div>
                <div class="quiz-nav-buttons">
                    <button id="prev-btn" class="secondary-btn">이전</button>
                    <button id="next-btn" class="primary-btn" disabled>다음</button>
                </div>
            </div>
        </section>

        <!-- 주관식 화면 -->
        <section id="subjective-view" class="view auth-layout">
            <div class="auth-card">
                <img src="logo.png" alt="DB Global Chip" class="logo-small-img">
                <div class="input-group" style="margin-top: 20px;">
                    <label class="subjective-label">현재 쓰고 있는 AI Tool</label>
                    <div id="current-tool-container" class="dynamic-input-container">
                        <div class="dynamic-input-row">
                            <input type="text" class="dynamic-input current-tool-input" placeholder="예: ChatGPT">
                            <button type="button" class="add-input-btn"
                                onclick="addInputRow('current-tool-container', 'current-tool-input')">+</button>
                        </div>
                    </div>
                </div>
                <div class="input-group">
                    <label class="subjective-label">경험해보고 싶은 AI Tool</label>
                    <div id="want-tool-container" class="dynamic-input-container">
                        <div class="dynamic-input-row">
                            <input type="text" class="dynamic-input want-tool-input" placeholder="예: Midjourney">
                            <button type="button" class="add-input-btn"
                                onclick="addInputRow('want-tool-container', 'want-tool-input')">+</button>
                        </div>
                    </div>
                </div>
                <div class="quiz-nav-buttons">
                    <button id="subjective-prev-btn" class="secondary-btn">이전</button>
                    <button id="subjective-submit-btn" class="primary-btn">진단 결과 확인하기</button>
                </div>
            </div>
        </section>

        <!-- 로딩 화면 -->
        <section id="loading-view" class="view loading-layout">
            <div class="loading-card">
                <div class="spinner"></div>
                <h2>결과 분석 중...</h2>
                <p>DB 글로벌칩 맞춤형 AI 협업 페르소나를 도출하고 있습니다.</p>
            </div>
        </section>

        <!-- 결과 화면 -->
        <section id="result-view" class="view result-layout">
            <div class="result-card">
                <img src="logo.png" alt="DB Global Chip" class="logo-small-img">
                <div class="result-header">
                    <h3>나의 AI 페르소나는?</h3>
                    <h1 id="result-title">AI 탐험가</h1>
                    <div class="result-score-wrap">
                        <div class="result-score">총점: <span id="result-score-val">0</span>점</div>
                    </div>
                </div>
                <div class="result-body">
                    <div class="result-desc-card">
                        <p id="result-desc">결과 상세 설명</p>
                    </div>
                    <div class="result-recommendation">
                        <h4>💡 DB 글로벌칩 업무 적용 팁</h4>
                        <ul id="result-tips">
                            <!-- 추천 팁 동적 생성 -->
                        </ul>
                    </div>
                </div>
                <div class="result-footer">
                    <button id="restart-btn" class="secondary-btn">처음으로 돌아가기</button>
                </div>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>

</html>
